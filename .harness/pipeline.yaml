pipeline:
  name: harness-mcp-demo
  identifier: harness_mcp_demo
  projectIdentifier: Femi_Sandbox
  orgIdentifier: sandbox
  tags:
    managed-by: git
  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: harness-mcp-demo
        build: <+input>
  stages:
    - stage:
        name: Build and Test
        identifier: ci_stage
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          caching:
            enabled: true
            paths:
              - node_modules
          execution:
            steps:
              - step:
                  name: Run Tests
                  identifier: run_tests
                  type: Run
                  spec:
                    image: node:20-alpine
                    command: |
                      npm ci --prefer-offline
                      npm test -- --ci --forceExit
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - junit.xml
              - step:
                  name: Build and Push Image
                  identifier: build_push
                  type: BuildAndPushDockerRegistry
                  spec:
                    repo: mcp-package
                    tags:
                      - 1.0.<+pipeline.sequenceId>
                      - latest
                    caching: true
                    buildArgs:
                      GIT_SHA: <+trigger.commitSha>
                    registryRef: mcp-demo
        description: ""
    - stage:
        name: Deploy to k8s-demo
        identifier: cd_stage
        type: Deployment
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: quoteservice
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
          environment:
            environmentRef: prod
            deployToAll: false
            infrastructureDefinitions:
              - identifier: mcpinfra
          execution:
            steps:
              - step:
                  name: Canary Deployment
                  identifier: canary_deployment
                  type: K8sCanaryDeploy
                  timeout: 10m
                  spec:
                    instanceSelection:
                      type: Count
                      spec:
                        count: 1
                    skipDryRun: false
              - step:
                  name: Canary Delete
                  identifier: canary_delete
                  type: K8sCanaryDelete
                  timeout: 10m
                  spec: {}
              - step:
                  name: Rolling Deployment
                  identifier: rolling_deployment
                  type: K8sRollingDeploy
                  timeout: 10m
                  spec:
                    skipDryRun: false
              - step:
                  name: Health Check
                  identifier: health_check
                  type: Run
                  spec:
                    image: curlimages/curl:latest
                    command: |
                      sleep 10
                      curl -sf http://quote-service.harness-mcp-demo.svc/health \
                        | grep -q '"status":"ok"'
                    timeout: 30s
            rollbackSteps:
              - step:
                  name: Canary Delete
                  identifier: rollback_canary_delete
                  type: K8sCanaryDelete
                  timeout: 10m
                  spec: {}
              - step:
                  name: Rolling Rollback
                  identifier: rolling_rollback
                  type: K8sRollingRollback
                  timeout: 10m
                  spec: {}
        tags: {}
